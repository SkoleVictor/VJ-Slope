<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slope Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(#111, #000);
        font-family: Arial, sans-serif;
        color: white;
    }

    canvas {
        display: block;
    }

    #ui {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 10;
        font-size: 18px;
    }

    #gameOver {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        text-align: center;
        display: none;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        background: #00ffcc;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="ui">
    Score: <span id="score">0</span><br>
    Highscore: <span id="highscore">0</span>
</div>

<div id="gameOver">
    GAME OVER<br>
    <button onclick="restart()">Respawn</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, platforms, score, speed, gravity, gameOver, highscore;

highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").innerText = highscore;

function init() {
    player = {
        x: 200,
        y: 100,
        vx: 0,
        vy: 0,
        size: 20
    };

    platforms = [];
    score = 0;
    speed = 6;
    gravity = 0.35;
    gameOver = false;

    for (let i = 0; i < 50; i++) {
        platforms.push({
            x: i * 200,
            y: canvas.height - 100 - Math.random() * 300,
            w: 200,
            h: 20
        });
    }

    document.getElementById("gameOver").style.display = "none";
}

function update() {
    if (gameOver) return;

    player.vy += gravity;
    player.x += speed;
    player.y += player.vy;

    // score
    score += 1;
    document.getElementById("score").innerText = Math.floor(score / 10);

    // speed increase
    speed += 0.0015;

    // generate platforms
    if (platforms[platforms.length - 1].x < player.x + 1200) {
        platforms.push({
            x: platforms[platforms.length - 1].x + 200,
            y: canvas.height - 100 - Math.random() * 300,
            w: 200,
            h: 20
        });
    }

    // collision
    let onGround = false;
    for (let p of platforms) {
        if (
            player.x < p.x + p.w &&
            player.x + player.size > p.x &&
            player.y + player.size < p.y + 10 &&
            player.y + player.size + player.vy >= p.y
        ) {
            player.y = p.y - player.size;
            player.vy = 0;
            onGround = true;
        }
    }

    if (!onGround && player.y > canvas.height + 200) {
        die();
    }

    if (player.y > canvas.height + 200) die();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // background glow grid
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // platforms
    for (let p of platforms) {
        ctx.fillStyle = "#00ffcc";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00ffcc";
        ctx.fillRect(p.x - cameraX(), p.y, p.w, p.h);
    }

    // player
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#ff0066";
    ctx.fillStyle = "#ff0066";
    ctx.fillRect(player.x - cameraX(), player.y, player.size, player.size);
}

function cameraX() {
    return player.x - 200;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function die() {
    gameOver = true;
    document.getElementById("gameOver").style.display = "block";

    let hs = localStorage.getItem("highscore") || 0;
    let current = Math.floor(score / 10);

    if (current > hs) {
        localStorage.setItem("highscore", current);
        document.getElementById("highscore").innerText = current;
    }
}

function restart() {
    init();
}

window.addEventListener("keydown", e => {
    if (e.code === "Space") {
        player.vy = -8;
    }
});

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

init();
loop();
</script>

</body>
</html>
