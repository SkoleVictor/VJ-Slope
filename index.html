from pathlib import Path

html = r"""<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slope 5 (Victor G)</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#ui{position:fixed;top:10px;left:10px;color:#00ff88;font-size:24px}
canvas{display:block}
</style>
</head>
<body>
<div id="ui">Score: 0</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,30,220);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1.5));
const dl=new THREE.DirectionalLight(0xffffff,2);
dl.position.set(10,20,10);
scene.add(dl);

const ball=new THREE.Mesh(
 new THREE.SphereGeometry(.8,32,32),
 new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x00ff66,emissiveIntensity:1})
);
ball.position.y=1;
scene.add(ball);

camera.position.set(0,5,10);

const roads=[];
const obstacles=[];

function makeRoad(z){
 const road=new THREE.Mesh(
  new THREE.BoxGeometry(12,.5,18),
  new THREE.MeshStandardMaterial({color:0x00ff66,emissive:0x006633})
 );
 road.rotation.z=(Math.random()-.5)*0.25;
 road.position.set((Math.random()-.5)*6,-.5,z);
 scene.add(road);
 roads.push(road);

 if(Math.random()<0.6){
   const o=new THREE.Mesh(
    new THREE.BoxGeometry(1.5,2,1.5),
    new THREE.MeshStandardMaterial({color:0xff2222,emissive:0xaa0000})
   );
   o.position.set(road.position.x+(Math.random()-.5)*8,1,z+(Math.random()-.5)*8);
   scene.add(o);
   obstacles.push(o);
 }
}

for(let i=0;i<40;i++) makeRoad(-i*18);

let left=false,right=false;
onkeydown=e=>{
 if(e.key==="ArrowLeft"||e.key==="a") left=true;
 if(e.key==="ArrowRight"||e.key==="d") right=true;
};
onkeyup=e=>{
 if(e.key==="ArrowLeft"||e.key==="a") left=false;
 if(e.key==="ArrowRight"||e.key==="d") right=false;
};

let speed=.45,score=0;

function endGame(){
 alert("Game Over! Score: "+Math.floor(score));
 location.reload();
}

function loop(){
 requestAnimationFrame(loop);

 if(left) ball.position.x-=0.22;
 if(right) ball.position.x+=0.22;

 score+=speed;
 speed+=0.00008;

 document.getElementById("ui").textContent="Score: "+Math.floor(score);

 let supported=false;

 roads.forEach(r=>{
   r.position.z+=speed;
   if(r.position.z>30){
      r.position.z-=720;
      r.position.x=(Math.random()-.5)*6;
      r.rotation.z=(Math.random()-.5)*0.25;
   }
   const dx=Math.abs(ball.position.x-r.position.x);
   const dz=Math.abs(ball.position.z-r.position.z);
   if(dx<6 && dz<9) supported=true;
 });

 obstacles.forEach(o=>{
   o.position.z+=speed;
   if(o.position.z>30){
      o.position.z-=720;
      o.position.x=(Math.random()-.5)*10;
   }
   const d=Math.hypot(ball.position.x-o.position.x,ball.position.z-o.position.z);
   if(d<1.4) endGame();
 });

 if(supported) ball.position.y=1;
 else ball.position.y-=0.22;

 if(ball.position.y<-10) endGame();

 camera.position.x+=(ball.position.x-camera.position.x)*0.08;
 camera.lookAt(ball.position.x,1,-15);

 renderer.render(scene,camera);
}
loop();

addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>"""

path = "/mnt/data/neon_runner_slope_inspireret.html"
Path(path).write_text(html, encoding="utf-8")
print(path)
